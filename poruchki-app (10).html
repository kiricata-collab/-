<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Поръчки и обекти</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f;
  --bg2: #141418;
  --bg3: #1c1c22;
  --border: #2a2a35;
  --text: #f0ede8;
  --muted: #6b6b7e;
  --gold: #e8b86d;
  --gold2: #d4894a;
  --green: #10b981;
  --red: #f43f5e;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --yellow: #f59e0b;
  --font: 'Manrope', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

/* LOGIN */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 0%, #1a1a2e 0%, var(--bg) 70%);
}
.login-box {
  width: 100%; max-width: 380px; padding: 40px 32px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 20px;
}
.login-logo { font-size: 32px; margin-bottom: 8px; }
.login-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
.role-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.role-btn {
  padding: 14px 8px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--bg3); color: var(--muted); cursor: pointer; text-align: center;
  transition: all 0.2s; font-family: var(--font); font-size: 12px; font-weight: 600;
}
.role-btn .icon { font-size: 22px; display: block; margin-bottom: 6px; }
.role-btn.active { border-color: var(--gold); color: var(--text); background: rgba(232,184,109,0.08); }
#worker-select-wrap { margin-bottom: 20px; display: none; }
#worker-select-wrap label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
select, input[type=text], input[type=number], textarea {
  width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; outline: none;
}
select:focus, input:focus, textarea:focus { border-color: var(--gold); }
.btn-primary {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  background: var(--gold); color: #0d0d0f; font-family: var(--font);
  font-size: 15px; font-weight: 800; cursor: pointer; transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

/* MAIN APP */
#app { display: none; }
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-logo { font-size: 20px; }
.topbar-title { font-size: 16px; font-weight: 800; }
.topbar-role {
  font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700;
  background: rgba(232,184,109,0.15); color: var(--gold);
}
.logout-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: var(--font);
}

.tabs {
  display: flex; gap: 4px; padding: 12px 16px; background: var(--bg2);
  border-bottom: 1px solid var(--border); overflow-x: auto;
}
.tab-btn {
  padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
  font-family: var(--font); font-size: 13px; font-weight: 600; white-space: nowrap;
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.tab-btn.active { background: var(--text); color: var(--bg); }

.content { padding: 16px; max-width: 900px; margin: 0 auto; padding-bottom: 80px; }

/* LOADING */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 60px; color: var(--muted); gap: 12px; font-size: 14px;
}
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* CARDS */
.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s;
}
.card:hover { border-color: var(--muted); }
.card.expanded { border-color: var(--gold); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.card-left { flex: 1; min-width: 0; }
.card-id { font-size: 11px; color: var(--muted); font-family: var(--mono); font-weight: 600; margin-bottom: 3px; }
.card-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-object { font-size: 12px; color: var(--muted); margin-top: 2px; }
.card-right { text-align: right; flex-shrink: 0; }
.card-sum { font-size: 16px; font-weight: 800; color: var(--gold); }
.card-ostatak { font-size: 11px; color: var(--red); margin-top: 2px; }

.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-top: 6px;
}
.badge-dot { width: 6px; height: 6px; border-radius: 50%; }

.card-details { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.detail-item label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 3px; }
.detail-item span { font-size: 13px; font-weight: 600; }
.detail-full { grid-column: 1/-1; }
.photo-link { color: var(--blue); font-size: 12px; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
.card-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn-edit { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--gold); background: transparent; color: var(--gold); font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-delete { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--red); background: transparent; color: var(--red); font-size: 13px; cursor: pointer; }
.btn-status { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--green); background: transparent; color: var(--green); font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; }

/* SEARCH & FILTERS */
.search-bar { position: relative; margin-bottom: 12px; }
.search-bar input { padding-left: 38px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.filter-btn {
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--font); transition: all 0.15s; white-space: nowrap;
}
.filter-btn.active { border-color: var(--gold); background: rgba(232,184,109,0.1); color: var(--gold); }

/* FAB */
.fab {
  position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px;
  border-radius: 50%; background: var(--gold); border: none; color: #0d0d0f;
  font-size: 26px; cursor: pointer; box-shadow: 0 4px 20px rgba(232,184,109,0.4);
  display: flex; align-items: center; justify-content: center; z-index: 40;
  transition: transform 0.2s;
}
.fab:hover { transform: scale(1.08); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100;
  overflow-y: auto; padding: 16px; display: none;
}
.modal-overlay.open { display: block; }
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 18px;
  padding: 22px; max-width: 500px; margin: 0 auto;
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 17px; font-weight: 800; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; line-height: 1; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-full { grid-column: 1/-1; }
.form-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 5px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel { flex: 1; padding: 13px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text); font-family: var(--font); font-size: 14px; cursor: pointer; }

/* FINANCE */
.fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.fin-card { background: var(--bg2); border-radius: 14px; padding: 16px; border: 1px solid; }
.fin-icon { font-size: 22px; margin-bottom: 8px; }
.fin-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
.fin-value { font-size: 19px; font-weight: 800; }

/* SCHEDULE */
.schedule-date { font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; margin-top: 16px; display: flex; align-items: center; gap: 8px; }
.schedule-date::after { content: ''; flex: 1; height: 1px; background: var(--border); display: block; }
.schedule-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
.worker-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.schedule-info { flex: 1; }
.schedule-client { font-size: 14px; font-weight: 600; }
.schedule-meta { font-size: 11px; color: var(--muted); }
.schedule-sum { font-size: 14px; font-weight: 700; color: var(--gold); }

/* STATUS BAR */
.status-bar { background: var(--bg3); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
.status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.status-name { font-size: 13px; }
.status-count { font-size: 12px; color: var(--muted); }
.status-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.status-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

/* CONFIRM */
.confirm-box { background: var(--bg2); border: 1px solid var(--red); border-radius: 16px; padding: 24px; max-width: 340px; margin: 60px auto; }
.confirm-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.confirm-text { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
.btn-danger { flex: 1; padding: 12px; border-radius: 10px; border: none; background: var(--red); color: #fff; font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer; }

/* TOAST */
.toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  padding: 10px 20px; border-radius: 24px; font-size: 13px; font-weight: 700;
  z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.4); color: #fff;
  animation: toastIn 0.2s ease; pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

.empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
.count-info { text-align: center; color: var(--muted); font-size: 12px; margin-top: 10px; }

textarea { resize: vertical; min-height: 60px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🪟</div>
    <div class="login-title">Поръчки и обекти</div>
    <div class="login-sub">Изберете вашата роля за достъп</div>
    <div class="role-grid">
      <button class="role-btn" data-role="shefa" onclick="selectRole('shefa')">
        <span class="icon">👑</span>Шефа
      </button>
      <button class="role-btn" data-role="office" onclick="selectRole('office')">
        <span class="icon">🖥️</span>Офис
      </button>
      <button class="role-btn" data-role="montajnik" onclick="selectRole('montajnik')">
        <span class="icon">🔧</span>Монтажник
      </button>
    </div>
    <div id="worker-select-wrap">
      <label>Изберете монтажник</label>
      <select id="worker-select">
        <option value="">-- Изберете --</option>
        <option value="Камен">Камен</option>
        <option value="Дидо">Дидо</option>
        <option value="Шефа">Шефа</option>
        <option value="Митака">Митака</option>
        <option value="Йрдан Атанасов">Йрдан Атанасов</option>
      </select>
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()" disabled>Влез</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🪟</span>
      <span class="topbar-title">Поръчки и обекти</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="topbar-role" id="role-badge"></span>
      <button class="logout-btn" onclick="doLogout()">Изход</button>
    </div>
  </div>

  <div class="tabs" id="tabs-bar"></div>

  <div class="content" id="main-content">
    <div class="loading"><div class="spinner"></div> Зареждане...</div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab-btn" onclick="openAddModal()" style="display:none" title="Нова поръчка">＋</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Нова поръчка</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="modal-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title">Изтриване</div>
    <div class="confirm-text" id="confirm-text"></div>
    <div style="display:flex;gap:10px">
      <button class="btn-cancel" style="flex:1" onclick="closeConfirm()">Откажи</button>
      <button class="btn-danger" id="confirm-ok">Изтрий</button>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyIbU_oHrqDOTAyma7IjsrMMY4VGWNnaCAtcpwlKpK4R7UiHVPdnCrNnbBXS-P0MRojAQ/exec';

let currentRole = '';
let currentWorker = '';
let currentTab = '';
let orders = [];
let schedule = [];
let dashboard = {};
let expandedId = null;
let filterStatus = 'Всички';
let searchVal = '';

const STATUSES = ['Запитване','Оферта','Потвърдена','В производство','За монтаж','Монтирана','За довършване','Платена'];
const STATUS_STYLES = {
  'Платена':        { bg:'#d1fae5', color:'#065f46', dot:'#10b981' },
  'Монтирана':      { bg:'#dbeafe', color:'#1e40af', dot:'#3b82f6' },
  'За монтаж':      { bg:'#fef3c7', color:'#92400e', dot:'#f59e0b' },
  'За довършване':  { bg:'#ffe4e6', color:'#9f1239', dot:'#f43f5e' },
  'В производство': { bg:'#ede9fe', color:'#5b21b6', dot:'#8b5cf6' },
  'Потвърдена':     { bg:'#e0f2fe', color:'#0c4a6e', dot:'#0ea5e9' },
  'Оферта':         { bg:'#f3f4f6', color:'#374151', dot:'#9ca3af' },
  'Запитване':      { bg:'#f3f4f6', color:'#374151', dot:'#9ca3af' },
};
const WORKER_COLORS = {
  'Камен':'#3b82f6','Дидо':'#f43f5e','Шефа':'#8b5cf6',
  'Митака':'#f59e0b','Йрдан Атанасов':'#10b981','Монтажник':'#9ca3af'
};

function fmt(n) {
  if (!n && n !== 0) return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  return '€' + num.toLocaleString('de-DE', {minimumFractionDigits:0, maximumFractionDigits:2});
}

function selectRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-role="${role}"]`).classList.add('active');
  const wrap = document.getElementById('worker-select-wrap');
  wrap.style.display = role === 'montajnik' ? 'block' : 'none';
  const btn = document.getElementById('login-btn');
  if (role === 'montajnik') {
    btn.disabled = true;
    document.getElementById('worker-select').onchange = function() {
      currentWorker = this.value;
      btn.disabled = !this.value;
    };
  } else {
    btn.disabled = false;
    currentWorker = '';
  }
}

function doLogin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const roleNames = { shefa:'👑 Шефа', office:'🖥️ Офис', montajnik:'🔧 ' + currentWorker };
  document.getElementById('role-badge').textContent = roleNames[currentRole];
  setupTabs();
}

function doLogout() {
  location.reload();
}

function setupTabs() {
  const tabs = {
    shefa:    [['orders','📋 Поръчки'],['schedule','📅 График'],['finance','💰 Финанси']],
    office:   [['orders','📋 Поръчки'],['schedule','📅 График']],
    montajnik:[['schedule','📅 График']],
  };
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = '';
  (tabs[currentRole] || []).forEach(([key, label]) => {
    const b = document.createElement('button');
    b.className = 'tab-btn';
    b.textContent = label;
    b.onclick = () => switchTab(key);
    b.id = 'tab-' + key;
    bar.appendChild(b);
  });
  const firstTab = (tabs[currentRole] || [])[0];
  if (firstTab) switchTab(firstTab[0]);
  if (currentRole !== 'montajnik') {
    document.getElementById('fab-btn').style.display = 'flex';
  }
  // Зареди поръчките във фона за всички роли (нужно за markPaid)
  if (currentRole === 'montajnik') {
    api({ action: 'getOrders', role: currentRole }).then(data => {
      if (Array.isArray(data)) orders = data;
    }).catch(() => {});
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tab-' + tab);
  if (btn) btn.classList.add('active');
  document.getElementById('fab-btn').style.display = (tab === 'orders' && currentRole !== 'montajnik') ? 'flex' : 'none';
  loadTab(tab);
}

function api(params) {
  return new Promise(function(resolve, reject) {
    const cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    window[cbName] = function(data) {
      delete window[cbName];
      const el = document.getElementById(cbName);
      if (el) el.remove();
      resolve(data);
    };
    params.callback = cbName;
    const url = API + '?' + new URLSearchParams(params);
    const script = document.createElement('script');
    script.id = cbName;
    script.src = url;
    script.onerror = function() { reject(new Error('Script error')); };
    document.head.appendChild(script);
    setTimeout(function() {
      if (window[cbName]) { delete window[cbName]; reject(new Error('Timeout')); }
    }, 15000);
  });
}

function apiPost(data) {
  const params = {
    action: data.action,
    role: data.role || currentRole,
    data: encodeURIComponent(JSON.stringify(data))
  };
  return api(params);
}

async function loadTab(tab) {
  const content = document.getElementById('main-content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div> Зареждане от таблицата...</div>';
  try {
    if (tab === 'orders') {
      orders = await api({ action: 'getOrders', role: currentRole });
      renderOrders();
    } else if (tab === 'schedule') {
      schedule = await api({ action: 'getSchedule', role: currentRole, worker: currentWorker });
      renderSchedule();
    } else if (tab === 'finance') {
      dashboard = await api({ action: 'getDashboard' });
      renderFinance();
    }
  } catch(e) {
    content.innerHTML = '<div class="empty">⚠️ Грешка при свързване с таблицата.<br>Провери интернет връзката.</div>';
  }
}

function renderOrders() {
  const content = document.getElementById('main-content');
  if (!Array.isArray(orders)) {
    content.innerHTML = '<div class="empty">⚠️ Грешка при зареждане на поръчките.</div>';
    return;
  }

  const statusCounts = {};
  orders.forEach(o => { const s = o['Статус']||''; statusCounts[s] = (statusCounts[s]||0)+1; });

  let filtered = orders.filter(o => {
    const s = (o['Клиент']||'').toLowerCase() + (o['Обект']||'').toLowerCase();
    const matchSearch = !searchVal || s.includes(searchVal.toLowerCase());
    const matchStatus = filterStatus === 'Всички' || o['Статус'] === filterStatus;
    return matchSearch && matchStatus;
  });

  let html = `
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Търси клиент или обект..." value="${searchVal}" 
        oninput="searchVal=this.value; renderOrders()" id="search-input">
    </div>
    <div class="filter-row">
      <button class="filter-btn ${filterStatus==='Всички'?'active':''}" onclick="setFilter('Всички')">Всички (${orders.length})</button>
  `;
  STATUSES.slice().reverse().forEach(s => {
    if (statusCounts[s]) {

let expandedScheduleIdx = null;

function renderSchedule() {
  const content = document.getElementById('main-content');
  if (!Array.isArray(schedule)) {
    content.innerHTML = '<div class="empty">⚠️ Грешка при зареждане на графика.</div>';
    return;
  }

  const grouped = {};
  schedule.forEach((s, idx) => {
    const d = fmtDate(s['Дата']) || 'Без дата';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push({...s, _idx: idx});
  });

  const sortedDates = Object.keys(grouped).sort((a, b) => {
    if (a === 'Без дата') return 1;
    if (b === 'Без дата') return -1;
    const toD = str => { const [d,m,y] = str.split('.'); return new Date(y+'-'+m+'-'+d); };
    return toD(a) - toD(b);
  });

  let html = '';
  if (sortedDates.length === 0) html = '<div class="empty">Няма записи в графика</div>';

  sortedDates.forEach(date => {
    html += '<div class="schedule-date">📅 ' + date + '</div>';
    grouped[date].forEach(s => {
      const idx = s._idx;
      const worker = s['Монтажник'] || '';
      const wc = WORKER_COLORS[worker] || '#9ca3af';
      const status = s['Статус'] || '';
      const sc = STATUS_STYLES[status] || STATUS_STYLES['Запитване'];
      const suma = s['Сума за плащане'];
      const expanded = expandedScheduleIdx === idx;
      const photo = s['Снимки'] || s['Calendar ID'] || '';

      html += '<div class="card ' + (expanded?'expanded':'') + '" onclick="toggleSchedule(' + idx + ')" style="margin-bottom:8px">';
      html += '<div style="display:flex;align-items:center;gap:10px">';
      html += '<span class="worker-dot" style="background:' + wc + ';width:10px;height:10px;border-radius:50%;flex-shrink:0"></span>';
      html += '<div style="flex:1;min-width:0">';
      html += '<div style="font-size:15px;font-weight:700">' + (s['Клиент']||'—') + '</div>';
      html += '<div style="font-size:12px;color:var(--muted)">' + (s['Обект']||'') + (worker?' · '+worker:'') + '</div>';
      if (s['Бележка']) html += '<div style="font-size:12px;color:#f59e0b;margin-top:2px">' + s['Бележка'] + '</div>';
      html += '<span class="badge" style="background:' + sc.bg + ';margin-top:4px"><span class="badge-dot" style="background:' + sc.dot + '"></span><span style="color:' + sc.color + '">' + status + '</span></span>';
      html += '</div>';
      html += '<div style="text-align:right;flex-shrink:0">';
      if (suma > 0) html += '<div style="font-size:15px;font-weight:800;color:var(--gold)">' + fmt(suma) + '</div>';
      html += '</div></div>';

      if (expanded) {
        html += '<div class="card-details">';
        if (photo) html += '<div style="margin-bottom:10px"><a class="photo-link" href="' + photo + '" target="_blank" onclick="event.stopPropagation()">📎 Виж снимки →</a></div>';
        
        if (currentRole === 'montajnik') {
          // Намери поръчката за да покаже сумата и остатъка
          const matchO = orders.find(o => String(o['Клиент']).trim() === String(s['Клиент']).trim());
          if (matchO) {
            html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;padding:10px;background:var(--bg3);border-radius:8px">';
            html += '<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px">Обща сума</div>';
            html += '<div style="font-size:16px;font-weight:800;color:var(--gold)">' + fmt(matchO['Сума']) + '</div></div>';
            html += '<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px">Остатък</div>';
            const ost = parseFloat(matchO['Остатък']) || 0;

            html += '</div>';

          html += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px">Получено от клиента (€)</div>';
          html += '<div style="display:flex;gap:8px">';
          html += '<input type="number" id="pay-' + idx + '" placeholder="0.00" onclick="event.stopPropagation()" style="flex:1;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none">';
          html += '<button class="btn-status" onclick="event.stopPropagation();markPaid(' + idx + ')" style="flex:0;white-space:nowrap;padding:9px 14px">💰 Запиши</button>';
          html += '</div></div>';

          html += '<button class="btn-status" onclick="event.stopPropagation();updateScheduleStatus(' + idx + ',\'Готов\')">✅ Готов</button>';

  }

  content.innerHTML = html;
}

async function markPaid(idx) {
  const s = schedule[idx];
  const input = document.getElementById('pay-' + idx);
  const amount = parseFloat(input ? input.value : 0);
  if (!amount || amount <= 0) { showToast('Въведи сума!', '#f43f5e'); return; }

  // Намери поръчката по клиент
  const matchOrder = orders.find(o => 
    String(o['Клиент']).trim() === String(s['Клиент']).trim()
  );

  if (!matchOrder || !matchOrder['ID']) { 
    showToast('⚠️ Не намерих поръчката', '#f43f5e'); 
    return; 
  }

  showToast('⏳ Запазване...', '#f59e0b');
  try {
    const newKaparo = (parseFloat(matchOrder['Капаро']) || 0) + amount;
    const suma = parseFloat(matchOrder['Сума']) || 0;
    const newOstatak = Math.max(0, suma - newKaparo);
    
    const fields = { 
      'Капаро': newKaparo,
      'Остатък': newOstatak
    };
    // Ако остатъкът е 0 → автоматично Платена
    if (newOstatak === 0) {
      fields['Статус'] = 'Платена';
    }

    await api({ action: 'updateOrder', role: currentRole, data: encodeURIComponent(JSON.stringify({
      id: matchOrder['ID'],
      fields: fields,
      role: currentRole
    }))});

    // Обнови локално
    matchOrder['Капаро'] = newKaparo;
    matchOrder['Остатък'] = newOstatak;
    if (newOstatak === 0) matchOrder['Статус'] = 'Платена';

    if (input) input.value = '';
    if (newOstatak === 0) {
      showToast('✅ Платено! Статусът е сменен на Платена! 🎉');
    } else {
      showToast('✅ Платено ' + fmt(amount) + ' записано! Остатък: ' + fmt(newOstatak));
    }
  } catch(e) { showToast('⚠️ Грешка', '#f43f5e'); }
}

async function updateScheduleStatus(idx, newStatus) {
  const s = schedule[idx];
  if (!s || !s['_row']) { showToast('⚠️ Няма ред', '#f43f5e'); return; }
  showToast('⏳ Запазване...', '#f59e0b');
  try {
    // Обнови статуса в График
    await api({ action: 'updateSchedule', data: encodeURIComponent(JSON.stringify({ rowIndex: s['_row'], fields: { 'Статус': newStatus } })) });
    schedule[idx]['Статус'] = newStatus;

    // Намери поръчката и обнови статуса и в ПОРЪЧКИ
    const statusInOrders = newStatus === 'Готов' ? 'Монтирана' : newStatus;
    const matchOrder = orders.find(o => 
      String(o['Клиент']).trim() === String(s['Клиент']).trim()
    );
    if (matchOrder && matchOrder['ID']) {
      await api({ action: 'updateOrder', role: currentRole, data: encodeURIComponent(JSON.stringify({
        id: matchOrder['ID'],
        fields: { 'Статус': statusInOrders },
        role: currentRole
      }))});
    }

    showToast('✅ Статусът е обновен!');
    renderSchedule();
  } catch(e) { showToast('⚠️ Грешка', '#f43f5e'); }
}

function fmtDate(d) {
  if (!d) return '';
  if (typeof d === 'string') {
    // ISO format: 2026-05-03T21:00:00.000Z
    if (d.includes('T') || d.includes('-')) {
      const date = new Date(d);
      if (!isNaN(date)) {
        return String(date.getDate()).padStart(2,'0') + '.' + String(date.getMonth()+1).padStart(2,'0') + '.' + date.getFullYear();
      }
    }
    return d;
  }
  if (typeof d === 'number') {
    const date = new Date(d);
    return String(date.getDate()).padStart(2,'0') + '.' + String(date.getMonth()+1).padStart(2,'0') + '.' + date.getFullYear();
  }
  if (d && typeof d === 'object') {
    const date = new Date(d);
    if (!isNaN(date)) {
      return String(date.getDate()).padStart(2,'0') + '.' + String(date.getMonth()+1).padStart(2,'0') + '.' + date.getFullYear();
    }
  }
  return String(d);
}

    'Капаро': parseFloat(document.getElementById('f-kaparo').value)||'',
    'Себестойност': document.getElementById('f-cost') ? parseFloat(document.getElementById('f-cost').value)||'' : '',
    'Разход': document.getElementById('f-expense') ? parseFloat(document.getElementById('f-expense').value)||'' : '',
    'дата монтаж': document.getElementById('f-mountdate').value,
    'Снимки': document.getElementById('f-photo').value,
    'Бележка': document.getElementById('f-note').value,
  };
  closeModal();
  showToast('⏳ Запазване...', '#f59e0b');
  try {
    await apiPost({ action: 'addOrder', order, role: currentRole });
    showToast('✅ Поръчката е добавена!');
    loadTab('orders');
  } catch(e) { showToast('⚠️ Грешка при запазване', '#f43f5e'); }
}

async function saveEdit(id, row) {
  const client = document.getElementById('f-client').value.trim();
  if (!client) { showToast('Въведи клиент!', '#f43f5e'); return; }
  const fields = {
    'Клиент': client,
    'Обект': document.getElementById('f-object').value,
    'Статус': document.getElementById('f-status').value,
    'Сума': parseFloat(document.getElementById('f-sum').value)||'',
    'Капаро': parseFloat(document.getElementById('f-kaparo').value)||'',
    'дата монтаж': document.getElementById('f-mountdate').value,
    'Снимки': document.getElementById('f-photo').value,
    'Бележка': document.getElementById('f-note').value,
  };
  if (document.getElementById('f-cost')) fields['Себестойност'] = parseFloat(document.getElementById('f-cost').value)||'';
  if (document.getElementById('f-expense')) fields['Разход'] = parseFloat(document.getElementById('f-expense').value)||'';
  closeModal();
  showToast('⏳ Запазване...', '#f59e0b');
  try {
    await apiPost({ action: 'updateOrder', id, fields, role: currentRole });
    showToast('✅ Поръчката е обновена!');
    loadTab('orders');
  } catch(e) { showToast('⚠️ Грешка при запазване', '#f43f5e'); }
}

function openAddScheduleModal() {
  document.getElementById('modal-title').textContent = '📅 Добави в график';
  const workerOpts = ['Камен','Дидо','Шефа','Митака','Йрдан Атанасов'].map(w =>
    `<option value="${w}">${w}</option>`).join('');
  const statusOpts = ['Планиран','За монтаж','За довършване','Готов'].map(s =>
    `<option value="${s}">${s}</option>`).join('');
  document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-group form-full"><label>Клиент</label>
        <input type="text" id="s-client"></div>
      <div class="form-group form-full"><label>Обект</label>
        <input type="text" id="s-object"></div>
      <div class="form-group"><label>Дата</label>
        <input type="text" id="s-date" placeholder="дд.мм.гггг"></div>
      <div class="form-group"><label>Монтажник</label>
        <select id="s-worker">${workerOpts}</select></div>
      <div class="form-group"><label>Статус</label>
        <select id="s-status">${statusOpts}</select></div>
      <div class="form-group"><label>Сума за плащане</label>
        <input type="number" id="s-sum"></div>
      <div class="form-group form-full"><label>Бележка</label>
        <textarea id="s-note"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Откажи</button>
      <button class="btn-primary" onclick="saveSchedule()" style="flex:2">Добави</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

async function saveSchedule() {
  const entry = {
    'Дата': document.getElementById('s-date').value,
    'Клиент': document.getElementById('s-client').value,
    'Обект': document.getElementById('s-object').value,
    'Монтажник': document.getElementById('s-worker').value,
    'Статус': document.getElementById('s-status').value,
    'Сума за плащане': parseFloat(document.getElementById('s-sum').value)||0,
    'Бележка': document.getElementById('s-note').value,
  };
  closeModal();
  showToast('⏳ Запазване...', '#f59e0b');
  try {
    await apiPost({ action: 'addSchedule', entry });
    showToast('✅ Добавено в графика!');
    loadTab('schedule');
  } catch(e) { showToast('⚠️ Грешка', '#f43f5e'); }
}

function openConfirm(id, name) {
  document.getElementById('confirm-text').innerHTML = `Сигурен ли си, че искаш да изтриеш поръчката на <strong>${name}</strong>?`;
  document.getElementById('confirm-ok').onclick = () => doDelete(id);
  document.getElementById('confirm-overlay').classList.add('open');
}

async function doDelete(id) {
  closeConfirm();
  showToast('⏳ Изтриване...', '#f59e0b');
  try {
    await apiPost({ action: 'deleteOrder', id });
    showToast('🗑️ Поръчката е изтрита!', '#f43f5e');
    loadTab('orders');
  } catch(e) { showToast('⚠️ Грешка', '#f43f5e'); }
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }

function showToast(msg, bg = '#10b981') {
  const old = document.getElementById('toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.id = 'toast';
  t.className = 'toast';
  t.style.background = bg;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
</script>
